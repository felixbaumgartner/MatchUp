<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatchUp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">MatchUp</h1>
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="moves">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">0:00</span>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <button class="btn" id="new-game">New Game</button>
  </div>

  <div class="overlay hidden" id="win-overlay">
    <div class="win-screen">
      <h2>You Win!</h2>
      <p>Moves: <span id="win-moves"></span></p>
      <p>Time: <span id="win-time"></span></p>
      <button class="btn" id="play-again">Play Again</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
